<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stool FAQ</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}

.container {
  background: #fff;
  border-radius: 16px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.3);
  padding: 36px;
  max-width: 600px;
  width: 100%;
  animation: fadeIn 0.3s ease;
}

@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

h1 { font-size: 22px; color: #1a1a2e; margin-bottom: 4px; }
.subtitle { color: #888; font-size: 13px; margin-bottom: 20px; }

.breadcrumb {
  display: flex; flex-wrap: wrap; gap: 2px; margin-bottom: 16px;
  font-size: 12px; color: #999; line-height: 1.6;
}
.breadcrumb span { cursor: pointer; color: #667eea; }
.breadcrumb span:hover { text-decoration: underline; }
.breadcrumb .sep { cursor: default; color: #ccc; text-decoration: none; }

.question-label { font-size: 17px; font-weight: 600; color: #1a1a2e; margin-bottom: 16px; line-height: 1.4; }

.options { display: flex; flex-direction: column; gap: 8px; margin-bottom: 20px; }

.option-btn {
  padding: 13px 16px; border: 2px solid #e8e8e8; border-radius: 10px;
  background: #fafafa; cursor: pointer; font-size: 14px; text-align: left;
  transition: all 0.15s ease; color: #333;
}
.option-btn:hover { border-color: #667eea; background: #f0f2ff; }

.btn { padding: 12px 20px; border: none; border-radius: 10px; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.15s ease; font-family: inherit; }
.btn-back { background: #f0f0f0; color: #555; margin-top: 8px; }
.btn-back:hover { background: #e0e0e0; }

.result-card { padding: 8px 0; }
.result-card p { color: #333; line-height: 1.7; margin-bottom: 16px; font-size: 15px; }
.result-card .answer-text {
  background: #f8f9ff; border-left: 3px solid #667eea;
  padding: 14px 16px; border-radius: 6px; margin-bottom: 16px;
}
.result-card a { color: #667eea; word-break: break-all; }

.btn-restart {
  background: linear-gradient(135deg, #667eea, #764ba2); color: #fff; width: 100%;
}
.btn-restart:hover { opacity: 0.9; transform: translateY(-1px); }
.hidden { display: none !important; }
</style>
</head>
<body>
<div class="container" id="app">
  <h1>Stool FAQ</h1>
  <p class="subtitle" id="stepLabel"></p>
  <div id="breadcrumb" class="breadcrumb"></div>
  <div id="questionArea"></div>
  <div id="resultArea" class="hidden"></div>
</div>

<script>
const faq = {

  /* ── ROOT: OS ─────────────────────────────────────── */
  start: {
    id: 'start', label: 'What operating system are you using?',
    options: [
      { text: 'Windows', next: 'win_games_or_tools' },
      { text: 'Linux', end: true, answer: 'Check the dedicated <strong>Linux support channel</strong> in Discord.<br><br>All Linux-related questions go there:<br>⇒ <a href="https://discord.com/channels/1327856038967246970/1444020081347793136" target="_blank">#linux-support</a><br><br>General tips:<br>• No CloudRedirect on Linux — setup is different.<br>• Place LUA files in the correct Steam config path for your distro.<br>• Check <strong>ProtonDB</strong> for game compatibility and recommended Proton versions.' },
      { text: 'Steam Deck (SteamOS)', end: true, answer: 'Check the dedicated <strong>Linux support channel</strong> in Discord — Steam Deck runs Linux and all Linux advice applies.<br><br>⇒ <a href="https://discord.com/channels/1327856038967246970/1444020081347793136" target="_blank">#linux-support</a><br><br>• Check <strong>ProtonDB</strong> for game compatibility.<br>• Try different Proton versions (Experimental, GE-Proton) for stubborn games.' },
      { text: 'macOS', end: true, answer: 'macOS is not officially supported. SteamTools and most related tools are Windows-only.<br><br>If you\'re running Windows via Boot Camp or a VM, select <strong>Windows</strong> instead.' },
    ],
  },

  /* ── WINDOWS: Games or Tools? ─────────────────────── */
  win_games_or_tools: {
    id: 'win_games_or_tools', label: 'Do you need help with games or with Steam-related tools?',
    options: [
      { text: 'Games (game won\'t launch, crashes, DRM, etc.)', end: true, answer: 'Game issues should be checked in <strong>#game-fixes</strong> first — that\'s where specific game fixes, cracks, and workarounds are posted.<br><br>⇒ Head to <a href="https://discord.com/channels/1327856038967246970/1462391493942579240" target="_blank">#game-fixes</a> and search for your game\'s thread.<br><br>If no fix exists for your game, it may be unplayable without buying it.' },
      { text: 'Steam-related tools (SteamTools, Hubcap, etc.)', next: 'tools' },
    ],
  },

  /* ── WHICH TOOL? ──────────────────────────────────── */
  tools: {
    id: 'tools', label: 'Which tool are you using?',
    options: [
      { text: 'SteamTools', next: 'steaminfo' },
      { text: 'OpenSteamTools', next: 'steaminfo' },
      { text: 'Hubcap (previously Solus) Manifest App', next: 'othertool' },
      { text: 'SteamIdra', next: 'othertool' },
      { text: 'LuaTools', next: 'othertool' },
      { text: 'ACCELA / GreenLuma / Others', next: 'othertool' },
      { text: 'I\'m new to this — don\'t know where to start', next: 'newbie' },
    ],
  },

  /* ── NEWBIE ───────────────────────────────────────── */
  newbie: {
    id: 'newbie', label: 'New to this? Here\'s where to start.',
    options: [
      { text: 'Show me the SteamTools guide', end: true, answer: 'Start here for the full SteamTools setup walkthrough:<br><br>⇒ <a href="https://discord.com/channels/1327856038967246970/1370719442933252198" target="_blank">#steamtools-guide</a><br><br>This covers: installation, adding games, placing Lua files, and solving common issues.' },
      { text: 'Show me the OpenSteamTools guide', end: true, answer: 'OpenSteamTools is an open-source alternative. Here\'s the setup guide:<br><br>⇒ <a href="https://discord.com/channels/1327856038967246970/1518272283997769909" target="_blank">#opensteamtools-guide</a>' },
    ],
  },

  /* ── NON-STEAMTOOLS TOOLS ─────────────────────────── */
  othertool: {
    id: 'othertool', label: 'What do you need?',
    options: [
      { text: 'Support for this tool', end: true, answer: 'We only provide support for <strong>SteamTools</strong> and <strong>OpenSteamTools</strong> in this server.<br><br>For Hubcap, SteamIdra, LuaTools, ACCELA, GreenLuma, or any other app — please ask in <strong>their own server or support channel</strong>. We don\'t have the information to help with third-party tools.' },
      { text: 'Tell me the story of the farmer and KFC', end: true, answer: '<em>Coming soon — this story will be uploaded later.</em>' },
    ],
  },

  /* ── STEAMTOOLS / OPENSTEAMTOOLS: Issue categories ── */
  steaminfo: {
    id: 'steaminfo', label: 'What issue are you having?',
    options: [
      { text: '"No internet connection" / "No licenses" error', next: 'noinet' },
      { text: 'Game won\'t launch / "Application load error"', next: 'launch' },
      { text: 'Game not appearing in my Steam library', next: 'nolibrary' },
      { text: 'Download stuck on "queued" / won\'t start', next: 'download' },
      { text: 'How do I get an API key?', next: 'apikey' },
      { text: 'Antivirus flagged a tool as a virus', next: 'av' },
      { text: 'DLC not working / content still locked', next: 'dlc' },
      { text: 'Multiplayer / online not working', next: 'multiplayer' },
      { text: 'Save files or achievements lost', next: 'saves' },
    ],
  },

  /* ── LAUNCH ERRORS ────────────────────────────────── */
  launch: {
    id: 'launch', label: 'What error do you see?',
    options: [
      { text: '"Application load error" with a number', next: 'apploaderr' },
      { text: 'Game crashes instantly / nothing happens', next: 'crash' },
      { text: '"No licenses" error', next: 'noinet' },
      { text: 'Asks me to buy the game', next: 'askbuy' },
    ],
  },

  apploaderr: {
    id: 'apploaderr', label: 'Do you know if the game has DRM protection?',
    options: [
      { text: 'Not sure / what\'s DRM?', end: true, answer: '<strong>Application Load Error means the game has DRM.</strong><br><br>1. First, run <strong>Steamless</strong> on the game\'s .exe — this removes SteamStub DRM.<br>2. If that doesn\'t work, the game likely has <strong>Denuvo/Themida/other DRM</strong>. Check <strong>#game-fixes</strong> for that specific game.<br>3. Some games need a crack from <strong>online-fix.me</strong> (also handles multiplayer).<br>4. If all else fails, the game may not be playable without buying it.' },
      { text: 'I already ran Steamless — still broken', end: true, answer: 'If Steamless didn\'t fix it, the game has non-SteamStub DRM (Denuvo, Themida, etc.).<br><br>1. Check <strong>#game-fixes</strong> — search for your game\'s thread.<br>2. Look on <strong>online-fix.me</strong> for a crack.<br>3. Some games simply cannot be cracked. If nobody has a fix, it likely can\'t be done.' },
    ],
  },

  crash: {
    id: 'crash', label: 'When does it crash?',
    options: [
      { text: 'Immediately on launch — nothing shows', end: true, answer: '1. Make sure the <strong>.lua file</strong> is in <code>C:\\Program Files (x86)\\Steam\\config\\stplug-in\\</code> (create the folder if missing).<br>2. <strong>Restart Steam</strong> after placing the file.<br>3. Run <strong>CloudRedirect</strong> first, then launch the game.<br>4. Check <strong>#game-fixes</strong> — the game may need a specific fix.<br>5. Install dependencies: DirectX, VC++ Redist, .NET Runtime.' },
      { text: 'After showing a logo / splash screen', end: true, answer: 'Usually missing dependencies or a bad crack.<br><br>1. Install all <strong>VC++ Redist versions</strong>, <strong>DirectX</strong>, and <strong>.NET Runtime</strong>.<br>2. If using an online fix, copy ALL files from the fix folder, not just the .exe.<br>3. Some games need a firewall outbound block on the .exe.<br>4. Check <strong>#game-fixes</strong> for that specific game.' },
    ],
  },

  askbuy: {
    id: 'askbuy', label: 'When does it ask you to buy?',
    options: [
      { text: 'After restarting my PC', end: true, answer: '1. <strong>Run CloudRedirect first</strong>, then launch the game — this restores the license bypass.<br>2. Set CloudRedirect to start with Windows to prevent this.<br>3. If it keeps happening, your LUA file may be outdated — regenerate it.' },
      { text: 'Every time, even with CloudRedirect', end: true, answer: '1. Your LUA file may be for the wrong game version — regenerate it with <code>/gen &lt;appid&gt;</code>.<br>2. Some games have extra license checks CloudRedirect alone can\'t bypass — check <strong>#game-fixes</strong>.' },
    ],
  },

  /* ── NO INTERNET / NO LICENSES ────────────────────── */
  noinet: {
    id: 'noinet', label: '"No internet" / "No licenses" — how are you launching?',
    options: [
      { text: 'Using SteamTools only (no CloudRedirect)', end: true, answer: '<strong>This is the #1 most common issue.</strong> The fix is <strong>CloudRedirect</strong>.<br><br>1. Download CloudRedirect from the Hubcap releases channel or GitHub.<br>2. Run it <strong>before</strong> launching your game — it handles the license check that SteamTools misses.<br>3. If CloudRedirect doesn\'t work, check pinned messages for the <strong>PowerShell fix command</strong>.<br>4. As a last resort: manually place manifest files in <code>Steam\\depotcache</code> before starting the download.' },
      { text: 'I AM running CloudRedirect and still get the error', end: true, answer: '1. Make sure CloudRedirect is <strong>running in the background</strong> — check the system tray.<br>2. <strong>Update CloudRedirect</strong> to the latest version.<br>3. <strong>Restart your PC</strong> — a stuck Steam process can block it.<br>4. Alternative: copy manifest files into <code>Steam\\depotcache</code>, then start Steam.<br>5. For specific games, check <strong>#game-fixes</strong> — some need extra workarounds.' },
    ],
  },

  /* ── NOT IN LIBRARY ───────────────────────────────── */
  nolibrary: {
    id: 'nolibrary', label: 'Games not in library — what have you tried?',
    options: [
      { text: 'I added the game in the tool but it doesn\'t show up', end: true, answer: '1. Place the <strong>.lua file</strong> in <code>C:\\Program Files (x86)\\Steam\\config\\stplug-in\\</code>.<br>2. If <strong>stplug-in</strong> folder doesn\'t exist inside config, <strong>create it manually</strong>.<br>3. <strong>Exit Steam completely</strong> from the system tray (not just close the window).<br>4. Run <strong>CloudRedirect</strong> before restarting Steam.<br>5. After restart, the game should appear in your library ready to download.' },
      { text: 'I already did all that — still nothing', end: true, answer: '1. Double-check the <strong>.lua file is named correctly</strong> — should be the app ID (e.g., <code>1234560.lua</code>).<br>2. Make sure it\'s in <code>config\\stplug-in\\</code>, not just <code>config\\</code>.<br>3. On a new Steam account, you may need to <strong>restart Steam twice</strong>.<br>4. Check the pinned guide in <strong>#how-to-steamtools</strong> for a full walkthrough.' },
    ],
  },

  /* ── DOWNLOADS ────────────────────────────────────── */
  download: {
    id: 'download', label: 'What\'s happening with the download?',
    options: [
      { text: 'Stuck on "queued" forever', end: true, answer: '1. Run <strong>CloudRedirect</strong> — fixes most queue issues.<br>2. Manually download manifest files and place them in <code>Steam\\depotcache\\</code> before starting Steam.<br>3. Clear Steam\'s download cache: Settings → Downloads → Clear Download Cache.<br>4. Try changing your Steam download region in settings.' },
      { text: 'Starts but stops / hangs mid-way', end: true, answer: '1. Keep <strong>CloudRedirect running</strong> during the download.<br>2. Try pausing and resuming.<br>3. Check your disk space — Steam silently stops if the drive is full.<br>4. Switch download region in Steam settings.<br>5. Use <strong>DepotDownloader</strong> directly instead of Steam.' },
      { text: 'DepotDownloader doesn\'t work / white flash / no response', end: true, answer: '1. Install <strong>.NET Runtime</strong> — DepotDownloader requires it.<br>2. Right-click the .exe → <strong>Properties → Unblock</strong> (Windows security checkbox).<br>3. Check your <strong>API key has no extra quotes or spaces</strong> in the command.<br>4. Try the newer <strong>DepotDownloader Mod</strong> from the Hubcap releases channel.' },
    ],
  },

  /* ── API KEY ──────────────────────────────────────── */
  apikey: {
    id: 'apikey', label: 'What\'s your API key situation?',
    options: [
      { text: 'First time — how do I get one?', end: true, answer: '1. Go to <strong>hubcapmanifest.com</strong>.<br>2. Join the Discord and check the <strong>#api</strong> channel.<br>3. Use the bot command — typically <code>/api</code> or <code>/gen</code>.<br>4. Your API key is shown once — save it somewhere safe.<br>5. You can retrieve it again from the website.' },
      { text: 'I lost my API key', end: true, answer: '1. Go back to <strong>hubcapmanifest.com</strong> — it should show your key.<br>2. If not, rerun the <code>/api</code> command in Discord to regenerate.<br>3. Old keys remain valid unless you explicitly revoke them.' },
      { text: 'Authentication error / key not working', end: true, answer: '1. Check for <strong>extra spaces or quotes</strong> around the key — the most common issue.<br>2. Make sure you\'re using the key as a <strong>Bearer token</strong> or the exact format the tool expects.<br>3. API keys expire — regenerate from the website.<br>4. Check the official API documentation for correct usage.' },
    ],
  },

  /* ── ANTIVIRUS ────────────────────────────────────── */
  av: {
    id: 'av', label: 'Which tool got flagged?',
    options: [
      { text: 'CloudRedirect.exe', end: true, answer: '<strong>False positive.</strong> CloudRedirect is open-source and safe.<br><br>1. Add an <strong>exclusion in Windows Defender</strong> for the CloudRedirect folder.<br>2. Or compile it yourself from the <strong>GitHub source</strong> if you\'re concerned.<br>3. Temporarily disable real-time protection during setup, then re-enable.<br>4. Virustotal shows only 1 unknown AV flag — normal for PyInstaller-built tools.' },
      { text: 'A .dll file (rune64.dll, steam_api64.dll, etc.)', end: true, answer: 'Crack .dll files often trigger antivirus. This is normal.<br><br>1. Add an exclusion in your AV for the game\'s folder.<br>2. Exclude the specific .dll path.<br>3. Only use cracks from trusted sources: <strong>online-fix.me</strong> or <strong>#game-fixes</strong>.' },
      { text: 'Some other tool from Discord', end: true, answer: '1. If it\'s in the <strong>official Hubcap releases channel</strong>, it\'s vetted and safe.<br>2. Scan with <strong>Virustotal.com</strong> — 1-2 flags is normal for crack tools. 5+ is suspicious.<br>3. When in doubt, ask in the support channel. Don\'t run random tools from unknown users.' },
    ],
  },

  /* ── DLC ──────────────────────────────────────────── */
  dlc: {
    id: 'dlc', label: 'What DLC issue?',
    options: [
      { text: 'DLC not showing / still locked', end: true, answer: '1. Get the <strong>latest .lua file</strong> — old files may not include DLC data.<br>2. DLC content is included in the LUA manifests — no separate file for most games.<br>3. Some games need <strong>CreamAPI</strong> — check <strong>#game-fixes</strong> for your game.<br>4. Run <strong>CloudRedirect</strong> — it helps DLC recognition.<br>5. Regenerate the LUA: <code>/gen &lt;appid&gt;</code> from the bot.' },
      { text: 'DLC worked before but stopped after a game update', end: true, answer: 'Game updates can break DLC unlocks.<br><br>1. Get a <strong>fresh .lua file</strong> for the updated version.<br>2. Delete the old .lua from <code>stplug-in</code> and replace it.<br>3. Check <strong>#game-fixes</strong> — someone may have posted an updated fix.<br>4. Restart Steam after replacing the file.' },
      { text: 'Specific game (Lies of P, Payday 2, Dead Cells, etc.)', end: true, answer: 'These games have known DLC workarounds.<br><br>1. Search <strong>#game-fixes</strong> for the game name.<br>2. Payday 2: DLC uses a different system — check the specific guide.<br>3. Lies of P / Dead Cells: get the latest LUA that includes DLC data.<br>4. If nothing works, post in #game-fixes with your game and version.' },
    ],

  /* ── MULTIPLAYER ──────────────────────────────────── */
  multiplayer: {
    id: 'multiplayer', label: 'What kind of multiplayer?',
    options: [
      { text: 'Trying to play co-op with friends', end: true, answer: '1. Download the <strong>online fix</strong> from <strong>online-fix.me</strong> for your game.<br>2. You can <strong>only play with other online-fix users</strong> — not with legit Steam owners.<br>3. Copy ALL files from the fix into the game folder, not just the .exe.<br>4. Some games require logging into an <strong>Epic Games account</strong> via the fix.<br>5. Check the online-fix page for game-specific instructions.' },
      { text: 'Can\'t connect to any servers / multiplayer menu broken', end: true, answer: '1. Most cracked games cannot reach official servers — normal behavior.<br>2. For LAN support, use <strong>Radmin VPN</strong> or <strong>Hamachi</strong> with friends.<br>3. Check <strong>online-fix.me</strong> — they run custom servers for many games.<br>4. Some games have open-source fixes (Goldberg emulator, etc.).' },
      { text: 'Online fix worked but stopped after a game update', end: true, answer: 'Game updates break online fixes.<br><br>1. Check <strong>online-fix.me</strong> for an updated fix matching the new version.<br>2. You may need to <strong>downgrade</strong> your game to match the fix (check #game-fixes).<br>3. <strong>Disable auto-updates</strong> for that game in Steam to prevent it from happening.' },
    ],
  },

  /* ── SAVES & ACHIEVEMENTS ─────────────────────────── */
  saves: {
    id: 'saves', label: 'What happened to your saves?',
    options: [
      { text: 'Saves disappeared after reinstalling', end: true, answer: '1. Check <code>C:\\Program Files (x86)\\Steam\\userdata\\&lt;yourid&gt;\\&lt;appid&gt;\\</code> for remaining save data.<br>2. Some games store saves in <strong>Documents</strong> or <strong>AppData</strong> too.<br>3. If you have a backup, copy saves to <strong>both</strong> the Steam userdata folder AND the game\'s local save location.<br>4. Use <strong>Ludusavi</strong> (free save backup tool) to prevent this in future.' },
      { text: 'Achievements disappeared after game update', end: true, answer: '1. Game updates can reset achievement tracking. Check that the <strong>usergamestats</strong> and <strong>usergamestatschema</strong> files still exist in the userdata folder.<br>2. Run <strong>CloudRedirect</strong> before launching — it can help Steam recognize the data.<br>3. If files are gone, they may be irrecoverable without a backup.' },
      { text: 'I have save files but the game won\'t recognize them', end: true, answer: '1. Make sure saves are in the <strong>correct folder</strong> — each game is different (check PCGamingWiki).<br>2. Copy them to both the Steam userdata folder AND the game\'s Documents/AppData folder.<br>3. Some games tie saves to your Steam ID — cracked versions may use a different ID, making old saves incompatible.' },
    ],
  },
};

let history = [];
let currentNode = 'start';
let pendingAnswer = null;

function render() {
  const node = faq[currentNode];
  const stepLabel = document.getElementById('stepLabel');
  const questionArea = document.getElementById('questionArea');
  const resultArea = document.getElementById('resultArea');

  if (pendingAnswer) {
    showResult(pendingAnswer);
    pendingAnswer = null;
    return;
  }

  stepLabel.textContent = node.id === 'start' ? 'Pick your situation from the list below' : 'Choose the option that matches';
  questionArea.classList.remove('hidden');
  resultArea.classList.add('hidden');

  updateBreadcrumb();

  let html = `<div class="question-label">${node.label}</div>`;
  html += '<div class="options">';
  node.options.forEach((opt) => {
    html += `<button class="option-btn" onclick="choose('${opt.next || ''}','${encodeURIComponent(opt.answer || '')}',${!!opt.end})">${opt.text}</button>`;
  });
  html += '</div>';

  if (history.length > 0) {
    html += '<button class="btn btn-back" onclick="goBack()">← Back</button>';
  }

  questionArea.innerHTML = html;
}

function choose(nextId, answerEnc, isEnd) {
  if (history.length === 0 || history[history.length - 1] !== currentNode) {
    history.push(currentNode);
  }
  if (isEnd) {
    pendingAnswer = decodeURIComponent(answerEnc);
  } else if (faq[nextId]) {
    currentNode = nextId;
  }
  render();
}

function goBack() {
  if (history.length === 0) return;
  currentNode = history.pop();
  pendingAnswer = null;
  render();
}

function updateBreadcrumb() {
  const breadcrumb = document.getElementById('breadcrumb');
  const items = [...history.map(id => ({ id, label: faq[id].label })), { id: currentNode, label: faq[currentNode].label }];
  breadcrumb.innerHTML = items.map((item, i) => {
    const sep = i < items.length - 1 ? '<span class="sep"> › </span>' : '';
    return `<span onclick="jumpTo('${item.id}',${i})">${item.label}</span>${sep}`;
  }).join('');
}

function jumpTo(nodeId, idx) {
  history.splice(idx);
  currentNode = nodeId;
  pendingAnswer = null;
  render();
}

function showResult(answer) {
  const questionArea = document.getElementById('questionArea');
  const resultArea = document.getElementById('resultArea');
  const stepLabel = document.getElementById('stepLabel');
  stepLabel.textContent = 'Here\'s your answer';
  questionArea.classList.add('hidden');
  resultArea.classList.remove('hidden');
  resultArea.innerHTML = `<div class="result-card"><div class="answer-text">${answer}</div><button class="btn btn-restart" onclick="restart()">Ask Another Question</button></div>`;
}

function restart() {
  history.length = 0;
  currentNode = 'start';
  pendingAnswer = null;
  render();
}

render();
</script>
</body>
</html>
