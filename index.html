<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stool FAQ</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
  min-height: 100vh;
  display: flex; align-items: center; justify-content: center; padding: 20px;
}

.container {
  background: #fff; border-radius: 16px; box-shadow: 0 20px 60px rgba(0,0,0,0.3);
  padding: 36px; max-width: 600px; width: 100%;
  animation: fadeIn 0.3s ease;
}

@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

h1 { font-size: 22px; color: #1a1a2e; margin-bottom: 4px; }
.subtitle { color: #888; font-size: 13px; margin-bottom: 20px; }

.breadcrumb {
  display: flex; flex-wrap: wrap; gap: 2px; margin-bottom: 16px;
  font-size: 12px; color: #999; line-height: 1.6;
}
.breadcrumb span { cursor: pointer; color: #667eea; }
.breadcrumb span:hover { text-decoration: underline; }
.breadcrumb .sep { cursor: default; color: #ccc; text-decoration: none; }

.question-label { font-size: 17px; font-weight: 600; color: #1a1a2e; margin-bottom: 16px; line-height: 1.4; }
.options { display: flex; flex-direction: column; gap: 8px; margin-bottom: 20px; }

.option-btn {
  padding: 13px 16px; border: 2px solid #e8e8e8; border-radius: 10px;
  background: #fafafa; cursor: pointer; font-size: 14px; text-align: left;
  transition: all 0.15s ease; color: #333;
}
.option-btn:hover { border-color: #667eea; background: #f0f2ff; }

.btn { padding: 12px 20px; border: none; border-radius: 10px; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.15s ease; font-family: inherit; }
.btn-back { background: #f0f0f0; color: #555; margin-top: 8px; }
.btn-back:hover { background: #e0e0e0; }

.result-card { padding: 8px 0; }
.result-card .answer-text {
  background: #f8f9ff; border-left: 3px solid #667eea;
  padding: 14px 16px; border-radius: 6px; margin-bottom: 16px;
  font-size: 14px; line-height: 1.8;
}
.result-card a { color: #667eea; word-break: break-all; }

.btn-restart {
  background: linear-gradient(135deg, #667eea, #764ba2); color: #fff; width: 100%;
}
.btn-restart:hover { opacity: 0.9; transform: translateY(-1px); }
.hidden { display: none !important; }

.rickroll-wrap {
  position: relative; width: 100%; padding-bottom: 56.25%; margin-bottom: 16px; border-radius: 8px; overflow: hidden;
}
.rickroll-wrap iframe {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0;
}

.story-container { text-align: center; padding: 10px 0; }
.story-title {
  font-size: 18px; font-weight: 700; color: #1a1a2e; margin-bottom: 16px;
  opacity: 0; animation: storyIn 0.5s 0.2s forwards;
}
.story-text { font-size: 14px; line-height: 2; color: #444; text-align: left; max-width: 460px; margin: 0 auto; }
.story-line { opacity: 0; }
.story-btn-wrap { opacity: 0; }

@keyframes storyIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>
<div class="container" id="app">

  <div id="breadcrumb" class="breadcrumb"></div>
  <div id="questionArea"></div>

/* ── Answer lookup ─────────────────────────────────── */
const answers = {
  linux: 'Check the <strong>Linux guides and support channel</strong> in Discord.<br><br>⇒ <a href="https://discord.com/channels/1327856038967246970/1447905805419679889" target="_blank">#linux-guides</a><br>⇒ <a href="https://discord.com/channels/1327856038967246970/1444020081347793136" target="_blank">#linux-support</a><br><br>General tips:<br>• No CloudRedirect on Linux — setup is different.<br>• Place LUA files in the correct Steam config path for your distro.<br>• Check <strong>ProtonDB</strong> for game compatibility and Proton versions.',

  steamdeck: 'Check the <strong>Linux guides and support channels</strong> — Steam Deck runs Linux and all Linux advice applies.<br><br>⇒ <a href="https://discord.com/channels/1327856038967246970/1447905805419679889" target="_blank">#linux-guides</a><br>⇒ <a href="https://discord.com/channels/1327856038967246970/1444020081347793136" target="_blank">#linux-support</a><br><br>• Check <strong>ProtonDB</strong> for game compatibility.<br>• Try Proton Experimental or GE-Proton for stubborn games.',

  macos: 'macOS is not officially supported. SteamTools and most related tools are Windows-only.<br><br>If you\'re running Windows via Boot Camp or a VM, select <strong>Windows</strong> instead.',

  games: 'Game issues should be checked in <strong>#game-fixes</strong> first — that\'s where specific game fixes, cracks, and workarounds are posted.<br><br>⇒ Head to <a href="https://discord.com/channels/1327856038967246970/1369722589471182920" target="_blank">#game-fixes</a> and search for your game\'s thread.<br><br>If no fix exists for your game, it may be unplayable without buying it.',

  newbie_st: 'Start here for the full SteamTools setup walkthrough:<br><br>⇒ <a href="https://discord.com/channels/1327856038967246970/1370719442933252198" target="_blank">#steamtools-guide</a><br><br>This covers: installation, adding games, placing Lua files, and solving common issues.',

  newbie_ost: 'OpenSteamTools is an open-source alternative. Here\'s the setup guide:<br><br>⇒ <a href="https://discord.com/channels/1327856038967246970/1518272283997769909" target="_blank">#opensteamtools-guide</a>',

  apploaderr_nodrm: '<strong>Application Load Error means the game has DRM.</strong><br><br>1. Run <strong>Steamless</strong> on the game\'s .exe — this removes SteamStub DRM. If you get "Index out of range" on 32bit games, use <strong>Steamless v3.1.0.3</strong>.<br>2. If that doesn\'t work, the game has <strong>Denuvo/Themida/other DRM</strong>. Check <strong>#game-fixes</strong>.<br>3. Some games need a crack from <strong>online-fix.me</strong>.<br>4. If nothing works, the game may not be playable without buying it.',

  apploaderr_steamless: 'If Steamless didn\'t fix it, the game has non-SteamStub DRM (Denuvo, Themida, etc.).<br><br>1. Check <strong>#game-fixes</strong> — search for your game\'s thread.<br>2. Look on <strong>online-fix.me</strong> for a crack.<br>3. Some games cannot be cracked. If nobody has a fix, it likely can\'t be done.',

  crash_immediate: '1. Make sure the <strong>.lua file</strong> is in <code>C:\\Program Files (x86)\\Steam\\config\\stplug-in\\</code> (create the folder if missing).<br>2. <strong>Restart Steam</strong> after placing the file.<br>3. Run <strong>CloudRedirect</strong> first, then launch the game.<br>4. Check <strong>#game-fixes</strong> — the game may need a specific fix.<br>5. Install dependencies: DirectX, VC++ Redist, .NET Runtime.',

  crash_splash: 'Usually missing dependencies or a bad crack.<br><br>1. Install all <strong>VC++ Redist versions</strong>, <strong>DirectX</strong>, and <strong>.NET Runtime</strong>.<br>2. If using an online fix, copy ALL files from the fix folder, not just the .exe.<br>3. Some games need a firewall outbound block on the .exe.<br>4. Check <strong>#game-fixes</strong> for that specific game.',

  askbuy_restart: '1. <strong>Run CloudRedirect first</strong>, then launch the game — this restores the license bypass.<br>2. Set CloudRedirect to start with Windows to prevent this.<br>3. If it keeps happening, your LUA file may be outdated — regenerate it.<br>4. If you\'re on a new Steam account, restart Steam twice.',

  askbuy_always: '1. Your LUA file may be for the wrong game version — regenerate with <code>/gen &lt;appid&gt;</code>.<br>2. Some games have extra license checks CloudRedirect alone can\'t bypass — check <strong>#game-fixes</strong>.<br>3. Try the alternative Steam.dll bypass (check pinned messages in support).',

  noinet_nocr: '<strong>This is the #1 most common issue.</strong> The fix is <strong>CloudRedirect</strong>.<br><br><strong>NO INTERNET CONNECTION / PURCHASE FIX:</strong><br>1. Download CloudRedirect from <a href="https://github.com/Selectively11/CloudRedirect/releases/" target="_blank">github.com/Selectively11/CloudRedirect/releases</a><br>2. Open <strong>CloudRedirect.exe</strong><br>3. Go to the <strong>Setup tab</strong><br>4. Click <strong>"Run All Patches"</strong><br>5. It will close Steam — that\'s normal. Restart Steam and your game works.<br><br>Still broken? Check pinned messages for the PowerShell fix, or place manifest files in <code>Steam\\depotcache</code> before download.',

  noinet_withcr: '1. Make sure CloudRedirect is <strong>running in the background</strong> — check system tray.<br>2. <strong>Update CloudRedirect</strong> from <a href="https://github.com/Selectively11/CloudRedirect/releases/" target="_blank">GitHub releases</a>.<br>3. Go to <strong>Setup tab → Run All Patches</strong> again.<br>4. <strong>Restart your PC</strong> — a stuck Steam process can block it.<br>5. Alternative: copy manifest files into <code>Steam\\depotcache</code>, then start Steam.<br>6. For specific games, check <strong>#game-fixes</strong>.',

  nolibrary_added: '1. Place the <strong>.lua file</strong> in <code>C:\\Program Files (x86)\\Steam\\config\\stplug-in\\</code>.<br>2. If <strong>stplug-in</strong> folder doesn\'t exist inside config, <strong>create it manually</strong>.<br>3. <strong>Exit Steam completely</strong> from the system tray (not just close window).<br>4. Run <strong>CloudRedirect</strong> before restarting Steam.<br>5. After restart, the game should appear in your library.',

  nolibrary_still: '1. Double-check the <strong>.lua file is named correctly</strong> — should be the app ID (e.g., <code>1234560.lua</code>).<br>2. Make sure it\'s in <code>config\\stplug-in\\</code>, not just <code>config\\</code>.<br>3. On a new Steam account, restart Steam twice.<br>4. Check the pinned guide in <strong>#how-to-steamtools</strong>.',

  download_queued: '1. Run <strong>CloudRedirect</strong> — fixes most queue issues.<br>2. Manually download manifest files into <code>Steam\\depotcache\\</code> before starting Steam.<br>3. Clear Steam\'s download cache: Settings → Downloads → Clear Download Cache.<br>4. Change Steam download region.<br>5. Downloads go through Steam servers — speed depends on region and time (weekends are slower).',

  download_hangs: '1. Keep <strong>CloudRedirect running</strong> during download.<br>2. Pause and resume.<br>3. Check disk space — Steam silently stops if full.<br>4. Switch Steam download region.<br>5. Use <strong>DepotDownloader</strong> directly instead.',

  download_depot: '1. Install <strong>.NET Runtime</strong> — DepotDownloader requires it.<br>2. Right-click the .exe → <strong>Properties → Unblock</strong>.<br>3. Check API key has <strong>no extra quotes or spaces</strong> in the command.<br>4. Try the newer <strong>DepotDownloader Mod</strong> from Hubcap releases.',

  apikey_first: '1. Go to <strong>hubcapmanifest.com</strong>.<br>2. Join the Discord and check <strong>#api</strong> channel.<br>3. Use bot command — typically <code>/api</code> or <code>/gen</code>.<br>4. Your API key is shown once — save it somewhere safe.<br>5. You can retrieve it again from the website.',

  apikey_lost: '1. Go back to <strong>hubcapmanifest.com</strong> — it should show your key.<br>2. If not, rerun <code>/api</code> in Discord to regenerate.<br>3. Old keys remain valid unless you revoke them.',

  apikey_auth: '1. Check for <strong>extra spaces or quotes</strong> around the key — the #1 issue.<br>2. Make sure you\'re using the key in the exact format the tool expects (usually Bearer token).<br>3. API keys expire — regenerate from the website.<br>4. Check the official API docs for correct usage.',

  av_cloudredirect: '<strong>Yes, it\'s safe. This is a false positive.</strong> CloudRedirect is open-source.<br><br>1. Add <strong>exclusion in Windows Defender</strong> for the CloudRedirect folder.<br>2. Or compile it from <strong>GitHub source</strong> if you want to verify.<br>3. Temporarily disable real-time protection during setup, then re-enable.<br>4. Virustotal shows only 1 unknown AV flag — normal for PyInstaller tools.<br><br><strong>Bottom line: it\'s completely safe, just add an exclusion.</strong>',

  av_dll: '<strong>Yes, it\'s safe.</strong> Crack .dll files trigger antivirus because of how they work — not because they\'re malicious.<br><br>1. Add exclusion in your AV for the game\'s folder.<br>2. Exclude the specific .dll path.<br>3. Only use cracks from trusted sources: <strong>online-fix.me</strong> or <strong>#game-fixes</strong>.<br><br><strong>Standard cracks will always flag — that\'s normal and safe.</strong>',

  av_other: '<strong>Yes, it\'s almost certainly safe.</strong> Tools in this community are open-source and vetted.<br><br>1. If it\'s in the <strong>official Hubcap releases channel</strong>, it\'s vetted and safe.<br>2. Scan with <strong>Virustotal.com</strong> — 1-2 flags is normal. 5+ is suspicious.<br>3. When in doubt, ask in support — but these tools are safe.<br><br><strong>Don\'t worry. The community tools are trusted and well-tested.</strong>',

  dlc_locked: '1. Get the <strong>latest .lua file</strong> — old files may not include DLC data.<br>2. DLC content is included in LUA manifests — no separate file for most games.<br>3. Some games need <strong>CreamAPI</strong> — check <strong>#game-fixes</strong>. Unlike SteamTools which injects into Steam, CreamAPI only affects the individual game.<br>4. Run <strong>CloudRedirect</strong> — helps DLC recognition.<br>5. Regenerate: <code>/gen &lt;appid&gt;</code> from the bot.',

  dlc_update: 'Game updates can break DLC unlocks.<br><br>1. Get a <strong>fresh .lua file</strong> for the updated version.<br>2. Delete the old .lua from <code>stplug-in</code> and replace it.<br>3. Check <strong>#game-fixes</strong> — someone may have an updated fix.<br>4. Restart Steam after replacing the file.',

  dlc_specific: 'These games have known DLC workarounds.<br><br>1. Search <strong>#game-fixes</strong> for the game name.<br>2. Payday 2: DLC uses a different system — check the specific guide.<br>3. Lies of P / Dead Cells: get the latest LUA with DLC data.<br>4. If nothing works, post in #game-fixes with game and version.',

  multi_coop: '1. Download the <strong>online fix</strong> from <strong>online-fix.me</strong> for your game.<br>2. You can <strong>only play with other online-fix users</strong> — not with legit Steam owners.<br>3. Copy ALL files from the fix into the game folder, not just the .exe.<br>4. Some games require logging into an <strong>Epic Games account</strong> via the fix.<br>5. Check the online-fix page for game-specific instructions.',

  multi_servers: '1. Most cracked games cannot reach official servers — normal behavior.<br>2. For LAN support, use <strong>Radmin VPN</strong> or <strong>Hamachi</strong> with friends.<br>3. Check <strong>online-fix.me</strong> — they run custom servers for many games.<br>4. Some games have open-source fixes (Goldberg emulator, etc.).',

  multi_update: 'Game updates break online fixes.<br><br>1. Check <strong>online-fix.me</strong> for an updated fix matching the new version.<br>2. You may need to <strong>downgrade</strong> your game to match the fix (check #game-fixes).<br>3. <strong>Disable auto-updates</strong> for that game in Steam.',

  saves_gone: '1. Check <code>C:\\Program Files (x86)\\Steam\\userdata\\&lt;yourid&gt;\\&lt;appid&gt;\\</code> for remaining save data.<br>2. Some games store saves in <strong>Documents</strong> or <strong>AppData</strong> too.<br>3. Steam keeps backups in <code>Steam\\userdata\\&lt;yourid&gt;\\&lt;appid&gt;\\remote\\</code>.<br>4. Copy saves to <strong>both</strong> the Steam userdata folder AND the game\'s local save location.<br>5. Use <strong>Ludusavi</strong> (free save backup tool) to prevent this.',

  saves_achievements: '1. Game updates can reset achievement tracking. Check that <strong>usergamestats</strong> and <strong>usergamestatschema</strong> files still exist in userdata.<br>2. Run <strong>CloudRedirect</strong> before launching — helps Steam recognize data.<br>3. Achievement tracking depends on the Steam client — make sure Steam is working.<br>4. If files are gone, they may be irrecoverable without a backup.',

  saves_recognize: '1. Make sure saves are in the <strong>correct folder</strong> — each game is different (check PCGamingWiki).<br>2. Copy them to both the Steam userdata folder AND the game\'s Documents/AppData folder.<br>3. Some games tie saves to your Steam ID — cracked versions may use a different ID. Try matching the Steam ID in the cracked save path.',
};

function showRickroll(resultArea) {

    <div class="rickroll-wrap">
      <iframe src="https://www.youtube.com/embed/dQw4w9WgXcQ?autoplay=1&mute=1&controls=0" allow="autoplay" allowfullscreen></iframe>

function showStory(resultArea) {
  let linesHtml = kfcStory.map((line, i) =>
    `<div class="story-line" style="animation:storyIn 0.5s ${0.6 + i * 0.4}s forwards">${line}</div>`
  ).join('');

  resultArea.innerHTML = `
    <div class="story-container">
      <div class="story-title">The Farmer and the KFC</div>
      <div class="story-text">${linesHtml}</div>
      <div class="story-btn-wrap" style="animation:storyIn 0.5s ${0.6 + kfcStory.length * 0.4}s forwards; margin-top:20px">
        <button class="btn btn-restart" onclick="restart()">Ask Another Question</button>
      </div>
    </div>
  `;
}

/* ── Router ────────────────────────────────────────── */
let history = [];
let currentNode = 'start';
let pendingAnswerKey = null;
let pendingSpecial = null;

function render() {
  const node = faq[currentNode];
  const stepLabel = document.getElementById('stepLabel');
  const questionArea = document.getElementById('questionArea');
  const resultArea = document.getElementById('resultArea');

  if (pendingSpecial === 'rickroll') {
    stepLabel.textContent = 'You really clicked that, huh?';
    questionArea.classList.add('hidden');
    resultArea.classList.remove('hidden');
    showRickroll(resultArea);
    pendingSpecial = null;
    return;
  }

  if (pendingSpecial === 'story') {
    stepLabel.textContent = 'A tale as old as time...';
    questionArea.classList.add('hidden');
    resultArea.classList.remove('hidden');
    showStory(resultArea);
    pendingSpecial = null;
    return;
  }

  if (pendingAnswerKey) {
    stepLabel.textContent = 'Here\'s your answer';
    questionArea.classList.add('hidden');
    resultArea.classList.remove('hidden');
    resultArea.innerHTML = `<div class="result-card"><div class="answer-text">${answers[pendingAnswerKey]}</div><button class="btn btn-restart" onclick="restart()">Ask Another Question</button></div>`;
    pendingAnswerKey = null;
    return;
  }

  stepLabel.textContent = node.id === 'start' ? 'Pick your situation from the list below' : 'Choose the option that matches';
  questionArea.classList.remove('hidden');
  resultArea.classList.add('hidden');

  updateBreadcrumb();

  let html = `<div class="question-label">${node.label}</div>`;
  html += '<div class="options">';
  node.options.forEach((opt, i) => {
    html += `<button class="option-btn" data-idx="${i}" onclick="handleClick(${i})">${opt.text}</button>`;
  });
  html += '</div>';

  if (history.length > 0) {
    html += '<button class="btn btn-back" onclick="goBack()">← Back</button>';
  }

  questionArea.innerHTML = html;
}

function handleClick(optIdx) {
  const opt = faq[currentNode].options[optIdx];
  if (history.length === 0 || history[history.length - 1] !== currentNode) {
    history.push(currentNode);
  }
  if (opt.end) {
    if (opt.end === 'rickroll') { pendingSpecial = 'rickroll'; }
    else if (opt.end === 'story') { pendingSpecial = 'story'; }
    else { pendingAnswerKey = opt.end; }
  } else if (faq[opt.next]) {
    currentNode = opt.next;
  }
  render();
}

function goBack() {
  if (history.length === 0) return;
  currentNode = history.pop();
  pendingAnswerKey = null;
  pendingSpecial = null;
  render();
}

function updateBreadcrumb() {
  const breadcrumb = document.getElementById('breadcrumb');
  const items = [...history.map(id => ({ id, label: faq[id].label })), { id: currentNode, label: faq[currentNode].label }];
  breadcrumb.innerHTML = items.map((item, i) => {
    const sep = i < items.length - 1 ? '<span class="sep"> › </span>' : '';
    return `<span onclick="jumpTo('${item.id}',${i})">${item.label}</span>${sep}`;
  }).join('');
}

function jumpTo(nodeId, idx) {
  history.splice(idx);
  currentNode = nodeId;
  pendingAnswerKey = null;
  pendingSpecial = null;
  render();
}

function restart() {
  history.length = 0;
  currentNode = 'start';
  pendingAnswerKey = null;
  pendingSpecial = null;
  render();
}

render();
</script>
</body>
</html>
