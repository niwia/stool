<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
  min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px;
}

.container {
  background: #fff; border-radius: 16px; box-shadow: 0 20px 60px rgba(0,0,0,0.3);
  padding: 36px; max-width: 620px; width: 100%;
  animation: fadeIn 0.3s ease;
}

@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

h1 { font-size: 22px; color: #1a1a2e; margin-bottom: 4px; }
.subtitle { color: #888; font-size: 13px; margin-bottom: 20px; }

.breadcrumb {
  display: flex; flex-wrap: wrap; gap: 2px; margin-bottom: 16px;
  font-size: 12px; color: #999; line-height: 1.6;
}
.breadcrumb span { cursor: pointer; color: #667eea; }
.breadcrumb span:hover { text-decoration: underline; }
.breadcrumb .sep { cursor: default; color: #ccc; text-decoration: none; }

.question-label { font-size: 17px; font-weight: 600; color: #1a1a2e; margin-bottom: 16px; line-height: 1.4; }
.options { display: flex; flex-direction: column; gap: 8px; margin-bottom: 20px; }

.option-btn {
  padding: 13px 16px; border: 2px solid #e8e8e8; border-radius: 10px;
  background: #fafafa; cursor: pointer; font-size: 14px; text-align: left;
  transition: all 0.15s ease; color: #333;
}
.option-btn:hover { border-color: #667eea; background: #f0f2ff; }

.btn { padding: 12px 20px; border: none; border-radius: 10px; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.15s ease; font-family: inherit; }
.btn-back { background: #f0f0f0; color: #555; margin-top: 8px; }
.btn-back:hover { background: #e0e0e0; }

.result-card { padding: 8px 0; }
.result-card .answer-text {
  background: #f8f9ff; border-left: 3px solid #667eea;
  padding: 14px 16px; border-radius: 6px; margin-bottom: 16px;
  font-size: 14px; line-height: 1.8;
}
.result-card a { color: #667eea; word-break: break-all; }

.btn-restart {
  background: linear-gradient(135deg, #667eea, #764ba2); color: #fff; width: 100%;
}
.btn-restart:hover { opacity: 0.9; transform: translateY(-1px); }
.hidden { display: none !important; }

.rickroll-wrap {
  position: relative; width: 100%; padding-bottom: 56.25%; margin-bottom: 16px; border-radius: 8px; overflow: hidden;
}
.rickroll-wrap iframe {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0;
}

.story-container { text-align: center; padding: 10px 0; }
.story-title { font-size: 18px; font-weight: 700; color: #1a1a2e; margin-bottom: 16px; }
.story-text { font-size: 14px; line-height: 2; color: #444; text-align: left; max-width: 460px; margin: 0 auto; }
.story-line { opacity: 0; }
.story-btn-wrap { opacity: 0; }

@keyframes storyIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>

/* ── Farmer & KFC story ────────────────────────────── */
const kfcStory = [
  'So you went to KFC...',
  'You walked in, hungry after a long day.',
  'The smell of fried chicken filled the air.',
  'You approached the counter...',
  'And asked for a bucket of chicken.',
  'The cashier, a tired-looking teenager, stared at you.',
  '"Sir," they said, "this is a Wendy\'s."',
  'You blinked. <em>What?</em>',
  'You looked around. Red hair logo. Square burgers.',
  'You were not at KFC.',
  'You had never been to KFC.',
  'You are a farmer.',
  'You grow corn.',
  'You don\'t even <em>like</em> chicken.',
  'You slowly backed away from the counter.',
  'Walked out into the parking lot.',
  'Got in your tractor.',
  'And drove home.',
  'The end.',
];

let preloadedRickroll = null;

function preloadRickroll() {
  const div = document.createElement('div');
  div.className = 'rickroll-wrap hidden';
  div.id = 'preloadRickroll';
  div.innerHTML = '<iframe src="https://www.youtube.com/embed/dQw4w9WgXcQ?autoplay=1&mute=1&controls=0" allow="autoplay" allowfullscreen></iframe>';
  document.getElementById('app').appendChild(div);
  preloadedRickroll = div;
}

function showRickroll(resultArea) {
  const pr = preloadedRickroll || document.getElementById('preloadRickroll');
  if (pr && pr.parentNode) {
    resultArea.innerHTML = '';
    resultArea.appendChild(pr);
    pr.classList.remove('hidden');
    const iframe = pr.querySelector('iframe');
    iframe.src = iframe.src; // force reload to retrigger autoplay
  } else {
    resultArea.innerHTML = `
      <div class="rickroll-wrap">
        <iframe src="https://www.youtube.com/embed/dQw4w9WgXcQ?autoplay=1&mute=1&controls=0" allow="autoplay" allowfullscreen></iframe>
      </div>`;
  }
  resultArea.innerHTML += `<button class="btn btn-restart" onclick="restart()">Ask Another Question</button>`;
}

function showStory(resultArea) {
  let linesHtml = kfcStory.map((line, i) =>
    `<div class="story-line" style="animation:storyIn 0.5s ${0.6 + i * 0.4}s forwards">${line}</div>`
  ).join('');
  resultArea.innerHTML = `
    <div class="story-container">
      <div class="story-title">The Farmer and the KFC</div>
      <div class="story-text">${linesHtml}</div>
      <div class="story-btn-wrap" style="animation:storyIn 0.5s ${0.6 + kfcStory.length * 0.4}s forwards; margin-top:20px">
        <button class="btn btn-restart" onclick="restart()">Ask Another Question</button>
      </div>
    </div>
  `;
}

/* ── Router ────────────────────────────────────────── */
let history = [];
let currentNode = 'start';
let pendingAnswerKey = null;
let pendingSpecial = null;

function render() {
  const node = faq[currentNode];
  const stepLabel = document.getElementById('stepLabel');
  const questionArea = document.getElementById('questionArea');
  const resultArea = document.getElementById('resultArea');

  if (pendingSpecial === 'rickroll') {
    stepLabel.textContent = 'You really clicked that, huh?';
    questionArea.classList.add('hidden');
    resultArea.classList.remove('hidden');
    showRickroll(resultArea);
    pendingSpecial = null;
    return;
  }
  if (pendingSpecial === 'story') {
    stepLabel.textContent = 'A tale as old as time...';
    questionArea.classList.add('hidden');
    resultArea.classList.remove('hidden');
    showStory(resultArea);
    pendingSpecial = null;
    return;
  }
  if (pendingAnswerKey) {
    stepLabel.textContent = 'Here\'s your answer';
    questionArea.classList.add('hidden');
    resultArea.classList.remove('hidden');
    resultArea.innerHTML = `<div class="result-card"><div class="answer-text">${answers[pendingAnswerKey]}</div><button class="btn btn-restart" onclick="restart()">Ask Another Question</button></div>`;
    pendingAnswerKey = null;
    return;
  }

  stepLabel.textContent = node.id === 'start' ? 'Pick your situation from the list below' : 'Choose the option that matches';
  questionArea.classList.remove('hidden');
  resultArea.classList.add('hidden');
  updateBreadcrumb();

  let html = `<div class="question-label">${node.label}</div>`;
  html += '<div class="options">';
  node.options.forEach((opt, i) => {
    html += `<button class="option-btn" onclick="handleClick(${i})">${opt.text}</button>`;
  });
  html += '</div>';
  if (history.length > 0) {
    html += '<button class="btn btn-back" onclick="goBack()">← Back</button>';
  }
  questionArea.innerHTML = html;
}

function handleClick(optIdx) {
  const opt = faq[currentNode].options[optIdx];
  if (history.length === 0 || history[history.length - 1] !== currentNode) {
    history.push(currentNode);
  }
  if (opt.end) {
    if (opt.end === 'rickroll') pendingSpecial = 'rickroll';
    else if (opt.end === 'story') pendingSpecial = 'story';
    else pendingAnswerKey = opt.end;
  } else if (faq[opt.next]) {
    currentNode = opt.next;
  }
  render();
}

function goBack() {
  if (history.length === 0) return;
  currentNode = history.pop();
  pendingAnswerKey = null;
  pendingSpecial = null;
  render();
}

function updateBreadcrumb() {
  const breadcrumb = document.getElementById('breadcrumb');
  const items = [...history.map(id => ({ id, label: faq[id].label })), { id: currentNode, label: faq[currentNode].label }];
  breadcrumb.innerHTML = items.map((item, i) => {
    const sep = i < items.length - 1 ? '<span class="sep"> › </span>' : '';
    return `<span onclick="jumpTo('${item.id}',${i})">${item.label}</span>${sep}`;
  }).join('');
}

function jumpTo(nodeId, idx) {
  history.splice(idx);
  currentNode = nodeId;
  pendingAnswerKey = null;
  pendingSpecial = null;
  render();
}

function restart() {
  const pr = document.getElementById('preloadRickroll');
  if (pr && pr.parentNode) {
    pr.classList.add('hidden');
    document.getElementById('app').appendChild(pr);
  }
  history.length = 0;
  currentNode = 'start';
  pendingAnswerKey = null;
  pendingSpecial = null;
  render();
}

preloadRickroll();
render();
</script>
